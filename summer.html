<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Stats</title>
    <style>
        * {
            color: white;
            text-align: center;
        }
        body {
            background-color: black;
        }
    </style>
    <link rel="stylesheet" href="css/font.css">
</head>
<body>
    <h1>Time till Summer</h1>
    <p>thanks, <a href="https://www.w3schools.com/howto/howto_js_countdown.asp">w3schools</a> for the countdown script</p>
    <h1 id="demo">loading</h1>
    <hr>
    <h1>Final Projects</h1>
    <p>Math - 115/120</p>
    <p>ELA - 80/80</p>
    <p>Art  - 80/80 </p>
    <p>Art - 20/20</p>
    <p>Science - 36/36</p>
    <h1>All done! :D</h1>
    <script>
        // Set the date we're counting down to
        var countDownDate = new Date("May 29, 2026 3:15:00").getTime();

        // Update the count down every 1 second
        var x = setInterval(function() {

        // Get today's date and time
        var now = new Date().getTime();

        // Find the distance between now and the count down date
        var distance = countDownDate - now;

        // Time calculations for days, hours, minutes and seconds
        var days = Math.floor(distance / (1000 * 60 * 60 * 24));
        var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        var seconds = Math.floor((distance % (1000 * 60)) / 1000);

        // Display the result in the element with id="demo"
        document.getElementById("demo").innerHTML = days + "d " + hours + "h "
        + minutes + "m " + seconds + "s ";

        // If the count down is finished, write some text
        if (distance < 0) {
            clearInterval(x);
            document.getElementById("demo").innerHTML = "SUMMER!!!";
        }
        }, 1000);
    </script>
</body>
</html>
